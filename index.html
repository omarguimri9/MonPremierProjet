<!DOCTYPE html>
<html>

<head>
    <title>Mon Site</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: #e94560;
            margin-top: 50px;
        }

        p {
            color: #a8a8b3;
            font-size: 20px;
        }

        button {
            background-color: #e94560;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #c73652;
        }
    </style>
</head>

<body>
    <h1 id="titre">Bonjour GitHub! 👋</h1>
    <p id="texte">Mon premier site web</p>
    <button onclick="changerTitre()">Changer le titre!</button>

    <script>
        function changerTitre() {
            document.getElementById("titre").innerText = "Tu as cliqué! 🎉";
            document.getElementById("texte").style.color = "yellow";
        }
    </script>
</body>

</html>
